<script id="trl-pages" type="text/x-trl">
/* ═══════════════════════════════════════════════════════════════
   TRL · ScriptsPages.html — dashboard · library · upload · approval · reports · users · master · settings · profile
   (inert block — injected by Scripts.html bootstrap)
   ═══════════════════════════════════════════════════════════════ */
(function () {
  'use strict';
  var T = window.TRL;
  var $ = T.$, $$ = T.$$, esc = T.esc, el = T.el, call = T.call, toast = T.toast, Modal = T.Modal, Spinner = T.Spinner, confirmModal = T.confirmModal, runBtn = T.runBtn;
  var Store = T.Store, hasCap = T.hasCap, fmtNum = T.fmtNum, fmtBytes = T.fmtBytes, TH = T.TH;
  var avatarHtml = T.avatarHtml, roleChip = T.roleChip, statusBadge = T.statusBadge, starsHtml = T.starsHtml, gradStyle = T.gradStyle;
  var barRows = T.barRows, svgDonut = T.svgDonut, svgLine = T.svgLine, resThumb = T.resThumb, emptyHtml = T.emptyHtml, skCards = T.skCards, animateCounters = T.animateCounters;
  var R = T.Routes, A = T.ACTIONS;

  function page(html) { var p = $('#page'); if (p) p.innerHTML = html; }
  function alive() { return !!$('#page'); }
  function bootCats() { return (Store.boot && Store.boot.categories) || []; }
  function bootLevels() { return (Store.boot && Store.boot.levels) || []; }
  function bootTypes() { return (Store.boot && Store.boot.restypes) || []; }
  function lvlLabel(k) { var f = bootLevels().filter(function (l) { return l.key === k; })[0]; return f ? f.label : k; }
  function statusLabel(s) { return (Store.boot && Store.boot.statuses && Store.boot.statuses[s]) || s; }
  function greet() { var h = new Date().getHours(); return h < 12 ? 'อรุณสวัสดิ์' : h < 17 ? 'สวัสดีตอนบ่าย' : 'สวัสดีตอนเย็น'; }
  function refreshBoot() { call('app.bootstrap', {}).then(function (d) { if (!d) return; if (d.categories) Store.boot.categories = d.categories; if (d.levels) Store.boot.levels = d.levels; if (d.restypes) Store.boot.restypes = d.restypes; if (d.settings) Store.boot.settings = d.settings; }).catch(function () {}); }

  /* ════════ SHARED: resource card ════════ */
  function resCard(r) {
    return '<div class="res-card" data-act="res-open" data-id="' + esc(r.id) + '">' + resThumb(r)
      + (r.featured ? '<span class="res-feat"><i class="bi bi-star-fill"></i> แนะนำ</span>' : '')
      + '<button class="res-fav' + (r.is_favorite ? ' on' : '') + '" data-act="res-fav" data-id="' + esc(r.id) + '"><i class="bi ' + (r.is_favorite ? 'bi-heart-fill' : 'bi-heart') + '"></i></button>'
      + '<span class="res-type-badge"><i class="bi ' + esc(r.type_icon) + '" style="color:' + esc(r.type_color) + '"></i> ' + esc(r.type_label) + '</span>'
      + '<div class="res-body"><span class="res-cat" style="color:' + esc(r.category_color) + '"><i class="bi ' + esc(r.category_icon) + '"></i> ' + esc(r.category_label) + '</span>'
      + '<div class="res-title">' + esc(r.title) + '</div>'
      + '<div class="res-meta"><span><i class="bi bi-mortarboard"></i> ' + esc(r.level_label) + '</span><span>' + starsHtml(r.rating, r.rating_count) + '</span></div>'
      + (r.status !== 'approved' ? '<div style="margin-top:7px">' + statusBadge(r.status, statusLabel(r.status)) + '</div>' : '')
      + '</div>'
      + '<div class="res-foot">' + avatarHtml(r.uploader_name, r.uploader_avatar, 'av') + '<span>' + esc(r.uploader_name) + '</span><span style="margin-left:auto"><i class="bi bi-download"></i> ' + fmtNum(r.downloads) + '</span></div></div>';
  }
  function resRow(r) {
    return '<div class="res-row" data-act="res-open" data-id="' + esc(r.id) + '"><div class="rt" style="' + gradStyle(r.type_color) + '"><i class="bi ' + esc(r.type_icon) + '"></i></div>'
      + '<div class="rb"><b>' + esc(r.title) + '</b><div class="res-meta"><span style="color:' + esc(r.category_color) + '"><i class="bi ' + esc(r.category_icon) + '"></i> ' + esc(r.category_label) + '</span><span><i class="bi bi-mortarboard"></i> ' + esc(r.level_label) + '</span><span>' + starsHtml(r.rating, r.rating_count) + '</span>' + (r.status !== 'approved' ? '<span>' + statusBadge(r.status, statusLabel(r.status)) + '</span>' : '') + '</div></div>'
      + '<div style="text-align:right;flex-shrink:0"><div style="font-family:Kanit;font-weight:800;color:var(--accent)">' + fmtNum(r.downloads) + '</div><small style="color:var(--muted)">ดาวน์โหลด</small></div></div>';
  }

  /* ════════ SHARED: resource detail modal ════════ */
  function openRes(id) {
    Modal.open({ title: 'รายละเอียดสื่อ', size: 'lg', html: '<div style="padding:30px;text-align:center"><div class="spin-inline" style="border-color:rgba(10,132,255,.3);border-top-color:var(--accent);width:30px;height:30px"></div></div>' });
    call('resource.get', { id: id }).then(function (r) {
      if (!$('#modal-host').classList.contains('is-open')) return;
      renderResModal(r);
    }).catch(function (e) { Modal.close(); toast(e.message, 'error', 4500); });
  }
  function renderResModal(r) {
    var canDl = hasCap('resource.download');
    var actions = '';
    if (r.can_approve && r.status === 'pending') actions += '<button class="btn btn-success btn-sm" data-act="rd-approve" data-id="' + esc(r.id) + '"><i class="bi bi-check-lg"></i> เผยแพร่</button><button class="btn btn-danger btn-sm" data-act="rd-reject" data-id="' + esc(r.id) + '"><i class="bi bi-arrow-counterclockwise"></i> ตีกลับ</button>';
    if (r.can_feature && r.status === 'approved') actions += '<button class="btn btn-soft btn-sm" data-act="rd-feature" data-id="' + esc(r.id) + '"><i class="bi bi-star' + (r.featured ? '-fill' : '') + '"></i> ' + (r.featured ? 'เลิกแนะนำ' : 'ตั้งแนะนำ') + '</button>';
    if (r.can_edit) actions += '<button class="btn btn-ghost btn-sm" data-act="rd-edit" data-id="' + esc(r.id) + '"><i class="bi bi-pencil"></i> แก้ไข</button>';
    if (r.can_delete) actions += '<button class="btn btn-ghost btn-sm" style="color:var(--danger)" data-act="rd-delete" data-id="' + esc(r.id) + '"><i class="bi bi-trash"></i> ลบ</button>';

    var reviews = (r.reviews || []).map(function (rv) {
      return '<div class="review-item">' + avatarHtml(rv.name, rv.avatar) + '<div style="flex:1"><b style="font-family:Kanit;font-size:13px">' + esc(rv.name) + '</b> ' + starsHtml(rv.score) + '<div style="font-size:13px;color:var(--ink2);margin-top:2px">' + esc(rv.comment) + '</div><small style="color:var(--muted)">' + TH.smart(rv.created_at) + '</small></div></div>';
    }).join('');

    var html = '<div class="rd-hero" style="' + gradStyle(r.category_color) + '">'
      + '<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px"><span class="badge" style="background:rgba(255,255,255,.2);color:#fff"><i class="bi ' + esc(r.type_icon) + '"></i> ' + esc(r.type_label) + '</span>' + (r.featured ? '<span class="badge" style="background:rgba(255,255,255,.25);color:#fff"><i class="bi bi-star-fill"></i> แนะนำ</span>' : '') + '<span class="badge" style="background:rgba(255,255,255,.2);color:#fff">' + esc(r.code) + '</span></div>'
      + '<h2 style="font-family:Kanit;font-weight:800;font-size:21px;margin:0 0 6px;position:relative;z-index:1">' + esc(r.title) + '</h2>'
      + '<div style="font-size:13px;opacity:.92;position:relative;z-index:1"><i class="bi ' + esc(r.category_icon) + '"></i> ' + esc(r.category_label) + ' · <i class="bi bi-mortarboard"></i> ' + esc(r.level_label) + '</div></div>'
      + '<div class="rd-stats"><div class="rd-stat"><b>' + fmtNum(r.downloads) + '</b><small>ดาวน์โหลด</small></div><div class="rd-stat"><b>' + fmtNum(r.views) + '</b><small>เข้าชม</small></div><div class="rd-stat"><b>' + (r.rating || '-') + '</b><small>คะแนน (' + r.rating_count + ')</small></div></div>'
      + (r.status !== 'approved' ? '<div style="margin-bottom:14px">' + statusBadge(r.status, statusLabel(r.status)) + (r.reject_reason ? ' <span style="font-size:12.5px;color:var(--danger)">เหตุผล: ' + esc(r.reject_reason) + '</span>' : '') + '</div>' : '')
      + (r.description ? '<div class="rd-sec"><h4><i class="bi bi-card-text"></i> รายละเอียด</h4><div style="font-size:13.5px;line-height:1.7;color:var(--ink2);white-space:pre-wrap">' + esc(r.description) + '</div></div>' : '')
      + (r.tags ? '<div class="rd-sec"><div style="display:flex;gap:6px;flex-wrap:wrap">' + r.tags.split(',').filter(Boolean).map(function (t2) { return '<span class="chip" style="cursor:default"><i class="bi bi-tag"></i> ' + esc(t2.trim()) + '</span>'; }).join('') + '</div></div>' : '')
      + '<div class="rd-sec"><h4><i class="bi bi-person"></i> ผู้เผยแพร่</h4><div style="display:flex;align-items:center;gap:10px">' + avatarHtml(r.uploader_name, r.uploader_avatar) + '<div><b style="font-family:Kanit">' + esc(r.uploader_name) + '</b><div style="font-size:12px;color:var(--muted)">เผยแพร่เมื่อ ' + TH.date(r.created_at) + '</div></div></div></div>'
      + '<div class="rd-sec"><h4><i class="bi bi-star"></i> ให้คะแนนสื่อนี้</h4><div class="rate-stars" id="rate-stars">' + [1, 2, 3, 4, 5].map(function (i) { return '<i class="bi bi-star' + (i <= (r.my_rating || 0) ? '-fill on' : '') + '" data-s="' + i + '"></i>'; }).join('') + '</div>'
      + '<textarea class="textarea" id="rate-comment" placeholder="เขียนความคิดเห็น (ไม่บังคับ)" style="margin-top:10px;min-height:60px">' + esc(r.my_comment || '') + '</textarea><button class="btn btn-soft btn-sm" id="rate-save" style="margin-top:8px"><i class="bi bi-send"></i> บันทึกคะแนน</button></div>'
      + (reviews ? '<div class="rd-sec"><h4><i class="bi bi-chat-quote"></i> ความคิดเห็น (' + (r.reviews || []).length + ')</h4>' + reviews + '</div>' : '');

    var footer = '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start;width:100%">' + actions + '<div style="margin-left:auto;display:flex;gap:8px">'
      + (canDl ? '<button class="btn btn-primary" data-act="rd-download" data-id="' + esc(r.id) + '"><i class="bi bi-download"></i> ดาวน์โหลด</button>' : '')
      + '</div></div>';
    Modal.open({
      title: 'รายละเอียดสื่อ', size: 'lg', html: html, footer: footer,
      onOpen: function (host) {
        // rating stars
        var cur = r.my_rating || 0;
        $$('#rate-stars i', host).forEach(function (st) {
          st.addEventListener('mouseenter', function () { var s = +st.getAttribute('data-s'); $$('#rate-stars i', host).forEach(function (x) { x.classList.toggle('hover', +x.getAttribute('data-s') <= s); }); });
          st.addEventListener('mouseleave', function () { $$('#rate-stars i', host).forEach(function (x) { x.classList.remove('hover'); }); });
          st.addEventListener('click', function () { cur = +st.getAttribute('data-s'); $$('#rate-stars i', host).forEach(function (x) { var on = +x.getAttribute('data-s') <= cur; x.className = 'bi bi-star' + (on ? '-fill on' : ''); x.setAttribute('data-s', x.getAttribute('data-s')); }); });
        });
        $('#rate-save', host).addEventListener('click', function () {
          if (!cur) { toast('กรุณาเลือกดาว', 'warning'); return; }
          runBtn($('#rate-save', host), { loading: 'กำลังบันทึก…', ok: 'ขอบคุณสำหรับคะแนน' }, function () { return call('rating.save', { id: r.id, score: cur, comment: $('#rate-comment', host).value }); }).then(function () {}).catch(function () {});
        });
      }
    });
  }

  A['res-open'] = function (e) { openRes(e.getAttribute('data-id')); };
  A['res-fav'] = function (e, ev) {
    var id = e.getAttribute('data-id');
    call('favorite.toggle', { id: id }).then(function (res) {
      var i = e.querySelector('i'); e.classList.toggle('on', res.favorite); i.className = 'bi ' + (res.favorite ? 'bi-heart-fill' : 'bi-heart');
      toast(res.favorite ? 'บันทึกในรายการโปรด' : 'นำออกจากรายการโปรด', 'success', 1600);
    }).catch(function (er) { toast(er.message, 'error'); });
  };
  A['rd-download'] = function (e) {
    var id = e.getAttribute('data-id');
    runBtn(e, { loading: 'กำลังเตรียมไฟล์…' }, function () { return call('resource.download', { id: id }); }).then(function (res) {
      if (res.url) window.open(res.url, '_blank'); else toast('ไม่พบไฟล์ดาวน์โหลด', 'warning');
      var st = $('.rd-stat b'); if (st) st.textContent = fmtNum(res.downloads);
    }).catch(function () {});
  };
  A['rd-approve'] = function (e) { var id = e.getAttribute('data-id'); runBtn(e, { loading: 'กำลังเผยแพร่…', ok: 'เผยแพร่สื่อแล้ว' }, function () { return call('resource.approve', { id: id }); }).then(function () { Modal.close(); refreshCurrent(); }).catch(function () {}); };
  A['rd-reject'] = function (e) {
    var id = e.getAttribute('data-id');
    Modal.open({ title: 'ตีกลับสื่อ', titleIcon: 'bi-arrow-counterclockwise', html: '<div class="field"><label>เหตุผลการตีกลับ <span class="req">*</span></label><textarea class="textarea" id="rj-reason" placeholder="ระบุสิ่งที่ต้องแก้ไข…"></textarea></div>', footer: '<button class="btn btn-ghost" data-modal-close>ยกเลิก</button><button class="btn btn-danger" id="rj-go"><i class="bi bi-send"></i> ตีกลับ</button>', onOpen: function (h) { $('#rj-go', h).addEventListener('click', function () { var rs = $('#rj-reason', h).value.trim(); if (rs.length < 3) { toast('กรุณาระบุเหตุผล', 'warning'); return; } runBtn($('#rj-go', h), { loading: 'กำลังส่ง…', ok: 'ตีกลับสื่อแล้ว' }, function () { return call('resource.reject', { id: id, reason: rs }); }).then(function () { Modal.close(); refreshCurrent(); }).catch(function () {}); }); } });
  };
  A['rd-feature'] = function (e) { var id = e.getAttribute('data-id'); runBtn(e, { loading: '…' }, function () { return call('resource.feature', { id: id }); }).then(function () { Modal.close(); openRes(id); refreshCurrent(); }).catch(function () {}); };
  A['rd-edit'] = function (e) { var id = e.getAttribute('data-id'); Modal.close(); location.hash = '#/upload?id=' + id; };
  A['rd-delete'] = function (e) {
    var id = e.getAttribute('data-id');
    confirmModal({ title: 'ลบสื่อ', message: 'ต้องการลบสื่อนี้ถาวรหรือไม่? การลบไม่สามารถกู้คืนได้', okText: 'ลบ', danger: true }).then(function (ok) {
      if (!ok) return;
      call('resource.delete', { id: id }).then(function () { Modal.close(); toast('ลบสื่อแล้ว', 'success'); refreshCurrent(); }).catch(function (er) { toast(er.message, 'error', 4500); });
    });
  };
  function refreshCurrent() { if (alive()) T.dispatch(); }

  /* ════════ DASHBOARD ════════ */
  R['#/dashboard'] = function () {
    page(skDash());
    call('resource.stats', {}).then(function (d) { if (!alive()) return; renderDash(d); }).catch(function (e) { if (alive()) page(emptyHtml('bi-wifi-off', 'โหลดข้อมูลไม่สำเร็จ', e.message)); });
  };
  function skDash() {
    return '<div class="page-wrap"><div class="sk" style="height:120px;border-radius:22px;margin-bottom:18px"></div><div class="kpi-grid">' + Array(6).join('x').split('x').map(function () { return '<div class="sk" style="height:110px;border-radius:18px"></div>'; }).join('') + '</div><div class="sk" style="height:240px;border-radius:20px"></div></div>';
  }
  function kpi(icon, color, val, label, sub) {
    return '<div class="kpi"><div class="ic" style="' + gradStyle(color) + '"><i class="bi ' + icon + '"></i></div><div class="v">' + fmtNum(val) + '</div><div class="l">' + esc(label) + '</div>' + (sub ? '<div class="sub">' + esc(sub) + '</div>' : '') + '</div>';
  }
  function renderDash(d) {
    var u = Store.user || {};
    var viewAll = d.view_all;
    var kpis = viewAll
      ? kpi('bi-collection', '#0a84ff', d.by_status.approved || 0, 'สื่อเผยแพร่', 'ทั้งหมด ' + fmtNum(d.total))
        + kpi('bi-hourglass-split', '#ff9f0a', d.pending, 'รออนุมัติ', '')
        + kpi('bi-download', '#34c759', d.total_downloads, 'ดาวน์โหลดรวม', '')
        + kpi('bi-eye', '#bf5af2', d.total_views, 'ยอดเข้าชม', '')
        + kpi('bi-people', '#ff375f', d.teachers, 'ครูผู้ใช้', '')
        + kpi('bi-star-half', '#febc2e', d.avg_rating, 'คะแนนเฉลี่ย', '')
      : kpi('bi-folder', '#0a84ff', d.mine, 'สื่อของฉัน', d.mine_approved + ' เผยแพร่')
        + kpi('bi-download', '#34c759', d.my_downloads, 'ยอดดาวน์โหลด', '')
        + kpi('bi-collection', '#bf5af2', d.by_status.approved || 0, 'สื่อในคลัง', '')
        + kpi('bi-heart', '#ff375f', d.favorites, 'รายการโปรด', '')
        + kpi('bi-hourglass', '#ff9f0a', d.by_status.pending || 0, 'รออนุมัติ', '')
        + kpi('bi-star-half', '#febc2e', d.avg_rating, 'คะแนนเฉลี่ย', '');

    var actions = actionGrid();
    var statusItems = [
      { label: 'เผยแพร่แล้ว', value: d.by_status.approved || 0, color: '#34c759' },
      { label: 'รออนุมัติ', value: d.by_status.pending || 0, color: '#ff9f0a' },
      { label: 'ฉบับร่าง', value: d.by_status.draft || 0, color: '#94a3b8' },
      { label: 'ตีกลับ', value: d.by_status.rejected || 0, color: '#ff453a' }
    ].filter(function (x) { return x.value > 0; });

    var topRes = (d.top_resources || []).slice(0, 5).map(function (r, i) {
      return '<div class="lrow" data-act="res-open" data-id="' + esc(r.id) + '" style="cursor:pointer"><div class="medal medal-' + (i < 3 ? (i + 1) : 'n') + '">' + (i + 1) + '</div><div class="lb"><b>' + esc(r.title) + '</b><small><i class="bi ' + esc(r.category_icon) + '"></i> ' + esc(r.category_label) + '</small></div><div class="lv">' + fmtNum(r.downloads) + '</div></div>';
    }).join('') || emptyHtml('bi-collection', 'ยังไม่มีสื่อ', '');

    var contrib = (d.top_contributors || []).map(function (c, i) {
      return '<div class="lrow"><div class="medal medal-' + (i < 3 ? (i + 1) : 'n') + '">' + (i + 1) + '</div>' + avatarHtml(c.name, c.avatar) + '<div class="lb"><b>' + esc(c.name) + '</b><small>' + esc(c.subject_group || '') + '</small></div><div class="lv">' + c.count + '</div></div>';
    }).join('') || emptyHtml('bi-people', 'ยังไม่มีข้อมูล', '');

    var recent = (d.recent || []).slice(0, 6).map(resRow).join('') || emptyHtml('bi-clock', 'ยังไม่มีสื่อล่าสุด', '');

    page('<div class="page-wrap">'
      + '<div class="hero-pro"><div class="hp-top">' + avatarHtml(u.full_name, u.avatar, 'lg') + '<div class="hp-greet"><h1>' + greet() + ', ' + esc((u.full_name || '').split(' ')[0]) + '</h1><p>' + TH.dateFull(new Date()) + '</p></div></div>'
      + '<div class="hp-badges"><span class="hp-badge">' + roleChip(u.role, (Store.boot.roles && Store.boot.roles[u.role]) || u.role) + '</span>'
      + (viewAll && d.pending ? '<span class="hp-badge"><i class="bi bi-bell"></i> รออนุมัติ ' + d.pending + ' รายการ</span>' : '')
      + '<span class="hp-badge"><i class="bi bi-collection"></i> ' + fmtNum(d.by_status.approved || 0) + ' สื่อในคลัง</span></div></div>'
      + '<div class="kpi-grid">' + kpis + '</div>'
      + '<div class="action-grid">' + actions + '</div>'
      + '<div class="grid2"><div class="panel"><div class="panel-h"><div class="ic"><i class="bi bi-graph-up"></i></div><h3>แนวโน้ม 14 วัน</h3></div>' + svgLine(d.trend) + '</div>'
      + '<div class="panel"><div class="panel-h"><div class="ic"><i class="bi bi-pie-chart"></i></div><h3>สถานะสื่อ</h3></div>' + svgDonut(statusItems) + '</div></div>'
      + '<div class="grid2"><div class="panel"><div class="panel-h"><div class="ic"><i class="bi bi-bar-chart"></i></div><h3>ตามกลุ่มสาระ</h3></div>' + barRows(d.cat_bars) + '</div>'
      + '<div class="panel"><div class="panel-h"><div class="ic"><i class="bi bi-collection"></i></div><h3>ตามประเภทสื่อ</h3></div>' + barRows(d.type_bars) + '</div></div>'
      + '<div class="grid2"><div class="panel"><div class="panel-h"><div class="ic"><i class="bi bi-trophy"></i></div><h3>สื่อยอดนิยม</h3></div>' + topRes + '</div>'
      + '<div class="panel"><div class="panel-h"><div class="ic"><i class="bi bi-people"></i></div><h3>ครูที่แบ่งปันมากที่สุด</h3></div>' + contrib + '</div></div>'
      + '<div class="panel"><div class="panel-h"><div class="ic"><i class="bi bi-clock-history"></i></div><h3>สื่อล่าสุด</h3><a class="btn btn-soft btn-sm" href="#/library"><i class="bi bi-arrow-right"></i> ดูทั้งหมด</a></div><div class="res-list">' + recent + '</div></div>'
      + '</div>');
    setTimeout(function () { $$('.bar-fill').forEach(function (b) { var w = b.style.width; b.style.width = '0'; setTimeout(function () { b.style.width = w; }, 50); }); }, 60);
  }
  function actionGrid() {
    var items = [

      runBtn($('#pf-save'), { loading: 'กำลังบันทึก…', ok: 'บันทึกโปรไฟล์สำเร็จ' }, function () { return call('profile.update', p); }).then(function (res) { Store.user = res.user; try { localStorage.setItem('trl.session', JSON.stringify({ user: res.user, caps: Store.caps })); } catch (e) {} T.renderShell(); T.dispatch(); }).catch(function () {});
    });
  };
  A['pf-avatar'] = function () { var f = $('#pf-file'); if (f) f.click(); };
  function pfAvatar(f) {
    if (f.size > 5 * 1024 * 1024) { toast('รูปใหญ่เกิน 5MB', 'warning'); return; }
    Spinner.show('กำลังอัปโหลดรูป', { stages: ['กำลังอ่านรูป…', 'กำลังบันทึก…'] });
    var rd = new FileReader();
    rd.onload = function () { call('profile.avatar', { data: rd.result, mime: f.type }, 60000).then(function (res) { Spinner.hide(); Store.user = res.user; try { localStorage.setItem('trl.session', JSON.stringify({ user: res.user, caps: Store.caps })); } catch (e) {} T.renderShell(); T.dispatch(); toast('เปลี่ยนรูปสำเร็จ', 'success'); }).catch(function (e) { Spinner.hide(); toast(e.message, 'error', 4500); }); };
    rd.readAsDataURL(f);
  }
})();
</script>
