<style>
/* ═══════════════════════════════════════════════════════════════
   TRL · Styles2.html — login · landing · dashboard · library · wizard · reports
   ═══════════════════════════════════════════════════════════════ */

/* ════════ LOGIN ════════ */
.lf-stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.lf-win{width:100%;max-width:1000px;background:var(--panel);border-radius:24px;box-shadow:var(--shadow-lg);overflow:hidden;display:grid;grid-template-columns:1.05fr 1fr;min-height:560px;border:1px solid rgba(255,255,255,.5);animation:mIn .4s var(--ease)}
.lf-brand{background:linear-gradient(155deg,#0a84ff,#5e5ce6 55%,#bf5af2);color:#fff;padding:34px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.lf-brand::before{content:'';position:absolute;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.22),transparent 65%);top:-110px;right:-80px;pointer-events:none}
.lf-brand::after{content:'';position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.13),transparent 60%);bottom:-90px;left:-70px;pointer-events:none}
.lf-traffic{position:relative;z-index:1}
.lf-logo{width:60px;height:60px;border-radius:18px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:30px;margin:26px 0 18px;position:relative;z-index:1;backdrop-filter:blur(6px)}
.lf-brand h1{font-family:'Kanit';font-weight:800;font-size:30px;line-height:1.18;margin:0 0 8px;position:relative;z-index:1}
.lf-brand p{opacity:.9;font-size:14px;line-height:1.6;margin:0 0 24px;position:relative;z-index:1}
.lf-feats{display:flex;flex-direction:column;gap:11px;position:relative;z-index:1}
.lf-feat{display:flex;gap:12px;align-items:center;background:rgba(255,255,255,.1);padding:11px 13px;border-radius:13px;transition:.2s var(--ease)}
.lf-feat:hover{background:rgba(255,255,255,.18);transform:translateX(4px)}
.lf-feat .fi{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.lf-feat b{font-family:'Kanit';font-size:13.5px;display:block}.lf-feat small{opacity:.82;font-size:11.5px}
.lf-stats{display:flex;gap:18px;margin-top:auto;padding-top:24px;position:relative;z-index:1}
.lf-stat b{font-family:'Kanit';font-weight:800;font-size:22px;display:block}.lf-stat small{opacity:.8;font-size:11px}
.lf-form-wrap{padding:40px 38px;display:flex;flex-direction:column;justify-content:center;overflow-y:auto}
.lf-mini{display:none;align-items:center;gap:11px;margin-bottom:20px}
.lf-mini .mi{width:44px;height:44px;border-radius:13px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px}
.lf-h{font-family:'Kanit';font-weight:800;font-size:25px;margin:0 0 6px}
.lf-sub{color:var(--muted2);font-size:13.5px;margin:0 0 22px}
.lf-input-wrap{position:relative;margin-bottom:13px}
.lf-input-wrap>i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.lf-input-wrap .input{padding-left:38px;height:46px}
.lf-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border:0;background:0;cursor:pointer;color:var(--muted2);border-radius:8px}
.lf-caps{font-size:11.5px;color:var(--warn);margin:-6px 0 10px;display:none;align-items:center;gap:5px}
.lf-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:12.5px}
.lf-check{display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--muted2)}
.lf-link{color:var(--accent);cursor:pointer;font-weight:600}
.lf-submit{width:100%;height:50px;border:0;border-radius:13px;background:var(--grad);color:#fff;font-family:'Kanit';font-weight:700;font-size:15.5px;cursor:pointer;position:relative;overflow:hidden;display:block;box-shadow:0 10px 24px rgba(10,132,255,.32);transition:.18s var(--ease)}
.lf-submit:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(10,132,255,.4)}
.lf-submit .st{display:flex;align-items:center;justify-content:center;gap:8px}
.lf-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--muted2)}
.lf-demo{margin-top:22px;border-top:1px dashed var(--line);padding-top:18px}
.lf-demo-head{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--muted2);margin-bottom:11px;font-family:'Kanit'}
.lf-demo-head .pill{margin-left:auto;background:linear-gradient(135deg,#febc2e,#ff9500);color:#7a3e00;padding:2px 9px;border-radius:99px;font-size:10px}
.lf-demo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.lf-demo-card{padding:11px 7px;border:1px solid var(--line);border-radius:12px;background:var(--panel);cursor:pointer;text-align:center;transition:.16s var(--ease)}
.lf-demo-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm);border-color:var(--accent)}
.lf-demo-card:active{transform:scale(.96)}
.lf-demo-card.loading{opacity:.55;pointer-events:none;border-color:var(--accent);position:relative}
.lf-demo-card.loading::after{content:'';position:absolute;top:8px;right:8px;width:14px;height:14px;border:2px solid rgba(10,132,255,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.lf-demo-card .di{width:34px;height:34px;border-radius:10px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff}
.lf-demo-card[data-role="admin"] .di{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.lf-demo-card[data-role="academic"] .di{background:linear-gradient(135deg,#60a5fa,#3b82f6)}
.lf-demo-card[data-role="teacher"] .di{background:linear-gradient(135deg,#34d399,#10b981)}
.lf-demo-card b{font-family:'Kanit';font-size:11.5px;display:block}.lf-demo-card small{font-size:9.5px;color:var(--muted);font-family:monospace}
.lf-back{display:inline-flex;align-items:center;gap:6px;color:var(--muted2);font-size:13px;cursor:pointer;margin-bottom:8px;font-weight:600}
.shake{animation:shake .45s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

/* ════════ LANDING ════════ */
.lp{min-height:100vh}
.lp-nav{position:sticky;top:0;z-index:50;background:var(--glass);backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);border-bottom:1px solid var(--line)}
.lp-nav-in{max-width:1200px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:14px}
.lp-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.lp-logo .ic{width:38px;height:38px;border-radius:11px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 6px 16px rgba(10,132,255,.3)}
.lp-logo b{font-family:'Kanit';font-weight:800;font-size:16px}
.lp-menu{margin-left:auto;display:flex;align-items:center;gap:4px}
.lp-menu a{padding:8px 13px;border-radius:9px;color:var(--ink2);font-weight:600;font-size:13.5px;cursor:pointer;transition:.14s var(--ease)}
.lp-menu a:hover{background:rgba(0,0,0,.05);color:var(--accent)}
.lp-hero{position:relative;overflow:hidden;background:linear-gradient(155deg,#0a84ff,#5e5ce6 55%,#bf5af2);color:#fff}
.lp-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.28;pointer-events:none}
.lp-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(900px 500px at 80% -10%,rgba(255,255,255,.22),transparent 60%);pointer-events:none}
.lp-hero-in{max-width:1100px;margin:0 auto;padding:64px 22px 72px;position:relative;z-index:1;text-align:center}
.lp-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.16);padding:6px 14px;border-radius:99px;font-size:12.5px;font-weight:600;margin-bottom:18px;backdrop-filter:blur(6px)}
.lp-badge .dot{width:7px;height:7px;border-radius:50%;background:#34c759;box-shadow:0 0 0 3px rgba(52,199,89,.3)}
.lp-hero h1{font-family:'Kanit';font-weight:800;font-size:clamp(30px,5.5vw,52px);line-height:1.1;margin:0 0 14px}
.lp-hero p{font-size:clamp(15px,2.4vw,19px);opacity:.92;max-width:640px;margin:0 auto 26px;line-height:1.6}
.lp-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.lp-cta .btn{height:48px;padding:0 24px;font-size:15px}
.lp-cta .btn-light{background:#fff;color:var(--accent-d)}
.lp-cta .btn-glass{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(6px)}
.lp-counters{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:760px;margin:40px auto 0}
.lp-counter{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:18px;backdrop-filter:blur(8px)}
.lp-counter b{font-family:'Kanit';font-weight:800;font-size:clamp(24px,4vw,34px);display:block;font-variant-numeric:tabular-nums}
.lp-counter small{opacity:.85;font-size:12.5px}
.lp-section{max-width:1200px;margin:0 auto;padding:54px 22px}
.lp-sh{text-align:center;margin-bottom:34px}
.lp-sh h2{font-family:'Kanit';font-weight:800;font-size:clamp(24px,3.4vw,32px);margin:0 0 8px}
.lp-sh p{color:var(--muted2);font-size:15px;margin:0}
.lp-cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.lp-cat{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px 16px;text-align:center;cursor:pointer;transition:.2s var(--ease)}
.lp-cat:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.lp-cat .ic{width:52px;height:52px;border-radius:15px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff}
.lp-cat b{font-family:'Kanit';font-size:14px;display:block;margin-bottom:3px}.lp-cat small{color:var(--muted);font-size:12px}
.lp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.lp-foot{background:#1c1c1e;color:#fff;padding:34px 22px;margin-top:30px}
.lp-foot-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.lp-foot .cp{font-size:13px;opacity:.85}
.lp-foot .ver{background:var(--grad);padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;margin-left:6px}
.lp-foot .dev{margin-left:auto;display:flex;align-items:center;gap:11px}
.lp-foot .dev img{width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.25);object-fit:cover}
.lp-foot .dev a{color:#fff;font-weight:600}.lp-foot .dev small{opacity:.7;font-size:11px}

/* ════════ RESOURCE CARD ════════ */
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.res-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;transition:.2s var(--ease);display:flex;flex-direction:column;position:relative}
.res-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.res-thumb{height:140px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.res-thumb img{width:100%;height:100%;object-fit:cover}
.res-thumb .ph{font-size:46px;color:#fff;opacity:.95;filter:drop-shadow(0 4px 10px rgba(0,0,0,.18))}
.res-fav{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted2);border:0;cursor:pointer;z-index:2;transition:.15s var(--ease)}
.res-fav:hover{transform:scale(1.1)}.res-fav.on{color:var(--danger)}
.res-feat{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,#febc2e,#ff9500);color:#7a3e00;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:99px;font-family:'Kanit';z-index:2}
.res-type-badge{position:absolute;bottom:10px;left:10px;background:rgba(255,255,255,.9);backdrop-filter:blur(6px);padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;display:flex;gap:4px;align-items:center;z-index:2}
.res-body{padding:13px 14px;flex:1;display:flex;flex-direction:column}
.res-cat{font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px;margin-bottom:6px}
.res-title{font-family:'Kanit';font-weight:700;font-size:14.5px;line-height:1.35;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.res-meta{font-size:11.5px;color:var(--muted);margin-top:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.res-meta span{display:inline-flex;align-items:center;gap:4px}
.res-foot{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid var(--line2);font-size:11.5px;color:var(--muted2)}
.res-foot .av{width:22px;height:22px;border-radius:50%;font-size:10px}
.stars{display:inline-flex;gap:1px;color:#ff9f0a}
.stars.muted{color:#d4d4d8}

/* list view */
.res-list .res-row{display:flex;gap:13px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 14px;cursor:pointer;transition:.15s var(--ease);margin-bottom:9px}
.res-list .res-row:hover{box-shadow:var(--shadow-sm);border-color:var(--accent)}
.res-row .rt{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;flex-shrink:0}
.res-row .rb{flex:1;min-width:0}
.res-row .rb b{font-family:'Kanit';font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ════════ STAT / DASHBOARD ════════ */
.hero-pro{position:relative;overflow:hidden;border-radius:22px;background:var(--grad);color:#fff;padding:24px 26px;margin-bottom:18px;box-shadow:0 16px 40px rgba(10,132,255,.25)}
.hero-pro::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.2),transparent 65%);top:-90px;right:-50px;pointer-events:none}
.hp-top{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.hp-greet{flex:1}.hp-greet h1{font-family:'Kanit';font-weight:800;font-size:23px;margin:0}.hp-greet p{opacity:.9;font-size:13px;margin:3px 0 0}
.hp-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;position:relative;z-index:1}
.hp-badge{background:rgba(255,255,255,.16);padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;backdrop-filter:blur(6px)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:13px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px 17px;position:relative;overflow:hidden;transition:.2s var(--ease)}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.kpi .ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;margin-bottom:11px}
.kpi .v{font-family:'Kanit';font-weight:800;font-size:27px;line-height:1;font-variant-numeric:tabular-nums}
.kpi .l{font-size:12.5px;color:var(--muted2);margin-top:4px}
.kpi .sub{font-size:11px;color:var(--muted);margin-top:3px}
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:12px;margin-bottom:18px}
.act-tile{background:var(--panel);border:1px solid var(--line);border-radius:17px;padding:15px 8px;text-align:center;cursor:pointer;transition:.18s var(--ease)}
.act-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.act-tile:active{transform:translateY(-1px) scale(.98)}
.act-tile .ic{width:48px;height:48px;border-radius:15px;margin:0 auto 9px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff}
.act-tile b{font-family:'Kanit';font-size:12px;display:block}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:16px}
.panel-h{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.panel-h h3{font-family:'Kanit';font-weight:800;font-size:16px;margin:0;flex:1}
.panel-h .ic{width:32px;height:32px;border-radius:10px;background:var(--tint);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:840px){.grid2{grid-template-columns:1fr}}

/* charts */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row .bl{width:120px;font-size:12px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:24px;background:var(--panel2);border-radius:8px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700;min-width:26px;transition:width 1s var(--ease)}
.don-legend{display:flex;flex-direction:column;gap:7px}
.don-legend .li{display:flex;align-items:center;gap:8px;font-size:12.5px}
.don-legend .dot{width:11px;height:11px;border-radius:3px}
.don-legend .pct{margin-left:auto;font-weight:700;color:var(--muted2)}
.medal{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;font-family:'Kanit';flex-shrink:0}
.medal-1{background:linear-gradient(135deg,#fcd34d,#f59e0b)}.medal-2{background:linear-gradient(135deg,#e5e7eb,#9ca3af)}.medal-3{background:linear-gradient(135deg,#fbbf24,#b45309)}.medal-n{background:#cbd5e1;color:#475569}

/* rank/list rows */
.lrow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line2)}
.lrow:last-child{border:0}
.lrow .lb{flex:1;min-width:0}.lrow .lb b{font-family:'Kanit';font-size:13.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .lb small{font-size:11.5px;color:var(--muted)}
.lrow .lv{font-family:'Kanit';font-weight:800;color:var(--accent);font-size:14px}

/* ════════ TABLE ════════ */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-family:'Kanit';font-size:11.5px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.03em;padding:10px 12px;background:var(--panel3);border-bottom:1px solid var(--line)}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line2);font-size:13.5px;vertical-align:middle}
.tbl tr:hover td{background:var(--panel3)}
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:16px}
.cell-u{display:flex;align-items:center;gap:9px}
.pager{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:18px}
.pager button{min-width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--panel);cursor:pointer;font-weight:600;font-size:13px;color:var(--ink2)}
.pager button.on{background:var(--grad);color:#fff;border:0}
.pager button:disabled{opacity:.4;cursor:not-allowed}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.toolbar .grow{flex:1;min-width:160px}
.tb-input{position:relative}
.tb-input i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.tb-input input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:11px;background:var(--panel);font-family:inherit;font-size:13.5px;outline:none}
.tb-input input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--tint)}
.seg{display:inline-flex;background:var(--panel2);border-radius:11px;padding:3px;gap:2px}
.seg button{padding:6px 11px;border:0;background:0;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--muted2);font-family:'Kanit'}
.seg button.on{background:var(--panel);color:var(--accent);box-shadow:var(--shadow-sm)}

/* ════════ WIZARD ════════ */
.wiz-steps{display:flex;align-items:flex-start;justify-content:space-between;position:relative;margin-bottom:22px;padding:0 8px}
.wiz-steps::before{content:'';position:absolute;top:18px;left:34px;right:34px;height:3px;background:var(--line);border-radius:3px}
.wiz-fill{position:absolute;top:18px;left:34px;height:3px;background:var(--grad);border-radius:3px;transition:width .5s var(--ease);box-shadow:0 0 10px rgba(10,132,255,.4)}
.wiz-step{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1;flex:1}
